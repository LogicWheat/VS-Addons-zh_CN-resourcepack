name: 打包源码并上传到 Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  upload-source:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 获取标签名（版本号）
        id: get_version
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          echo "tag_name=${TAG_NAME}" >> $GITHUB_OUTPUT

      - name: 打包源码并生成压缩包名称
        id: package
        run: |
          ZIP_NAME="Simulated-Mods-zh_CN-${{ steps.get_version.outputs.tag_name }}.zip"
          echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_OUTPUT
          zip -r "${ZIP_NAME}" . -x "*.git*"

      - name: 创建 Release 并上传附件
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.package.outputs.ZIP_NAME }}